<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BefCounter</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css?v=2">
</head>
<body>
    <div id="live-ticker"></div>

    <div class="header">
        <h1>BefCounter</h1>
        <div id="header-controls" class="header-controls">
            <span class="groep-badge" id="display-groepscode">Groep</span>
            <span class="coin-badge">🪙 <span id="coin-weergave">0</span></span>
            <button onclick="uitloggen()" class="btn-gevaar">Uitloggen</button>
        </div>
    </div>

    <div class="container">
        <div id="auth-container">
            <div id="auth-scherm" class="card active">
                <h2>BefCounter Login</h2>
                <input type="text" id="auth-naam" placeholder="Gebruikersnaam">
                <input type="password" id="auth-wachtwoord" placeholder="Wachtwoord">
                <button onclick="login()" class="btn-primair">Inloggen</button>
                <button onclick="registreer()" class="btn-secundair">Registreren</button>
            </div>

            <div id="lobby-scherm" class="card">
                <h2>Welkom, <span id="lobby-gebruikersnaam"></span>!</h2>
                <button onclick="maakNieuweGroep()" class="btn-primair">Groep Aanmaken</button>
                <input type="text" id="lobby-code" placeholder="GROEPSCODE" style="margin-top: 15px;">
                <button onclick="joinGroep()" class="btn-secundair">Join Groep</button>
            </div>
        </div>

        <div id="app-scherm">
            <div id="page-scores" class="page active">
                <div class="card">
                    <h2>Scores Invoeren</h2>
                    <div class="actie-grid">
                        <div class="actie-kaart bg-bier">
                            <span class="emoji">🍺</span><span class="titel">Pils</span>
                            <div class="knoppen-groep">
                                <button class="btn-actie btn-min" onclick="pasScoreAan('bier', -1, '🍺 Bier')">-1</button>
                                <button class="btn-actie btn-plus" onclick="pasScoreAan('bier', 1, '🍺 Bier')">+1</button>
                            </div>
                        </div>
                        <div class="actie-kaart bg-mix">
                            <span class="emoji">🍹</span><span class="titel">Mix</span>
                            <div class="knoppen-groep">
                                <button class="btn-actie btn-min" onclick="pasScoreAan('mix', -1, '🍹 Mixje')">-1</button>
                                <button class="btn-actie btn-plus" onclick="pasScoreAan('mix', 1, '🍹 Mixje')">+1</button>
                            </div>
                        </div>
                        <div class="actie-kaart bg-kiss">
                            <span class="emoji">😘</span><span class="titel">Kiss</span>
                            <div class="knoppen-groep">
                                <button class="btn-actie btn-min" onclick="pasScoreAan('kiss', -1, '😘 Kiss')">-1</button>
                                <button class="btn-actie btn-plus" onclick="pasScoreAan('kiss', 1, '😘 Kiss')">+1</button>
                            </div>
                        </div>
                        <div class="actie-kaart bg-reject">
                            <span class="emoji">💔</span><span class="titel">Reject</span>
                            <div class="knoppen-groep">
                                <button class="btn-actie btn-min" onclick="pasScoreAan('rejection', -1, '💔 Reject')">-1</button>
                                <button class="btn-actie btn-plus" onclick="pasScoreAan('rejection', 1, '💔 Reject')">+1</button>
                            </div>
                        </div>
                        <div class="actie-kaart bg-mvp">
                            <span class="emoji">👑</span><span class="titel">MVP</span>
                            <div class="knoppen-groep">
                                <button class="btn-actie btn-min" onclick="pasScoreAan('mvp', -1, '👑 MVP')">-1</button>
                                <button class="btn-actie btn-plus" onclick="pasScoreAan('mvp', 1, '👑 MVP')">+1</button>
                            </div>
                        </div>
                        <div class="actie-kaart bg-doner">
                            <span class="emoji">🥙</span><span class="titel">Döner</span>
                            <div class="knoppen-groep">
                                <button class="btn-actie btn-min" onclick="pasScoreAan('doner', -1, '🥙 Döner')">-1</button>
                                <button class="btn-actie btn-plus" onclick="pasScoreAan('doner', 1, '🥙 Döner')">+1</button>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="card" style="overflow-x: auto;">
                    <table id="score-tabel"></table>
                </div>
            </div>

            <div id="page-games" class="page">
                <div class="card">
                    <h2>🎡 Rad van Fortuin</h2>
                    <div id="rad-box"><span id="rad-uitkomst">Draai het rad!</span></div>
                    <button onclick="draaiRad()" class="btn-primair">Draai</button>
                </div>
                <div class="card bom-card" id="bom-card">
                    <h2>💣 Tijdbom</h2>
                    <div id="bom-idle-ui"><button onclick="startTijdbom()" class="btn-primair">Start</button></div>
                    <div id="bom-active-ui" style="display:none;"><p id="bom-status-tekst"></p><button id="btn-gooi-door" onclick="gooiBomDoor()" class="btn-gevaar">Gooi door!</button></div>
                </div>
                <div class="card">
                    <h2>🌴 Bingo</h2>
                    <div id="bingo-grid" class="bingo-grid"></div>
                </div>
            </div>

            <div id="page-stats" class="page">
                <div class="card">
                    <h2>Statistieken</h2>
                    <div id="stats-container"></div>
                    <div class="chart-container"><canvas id="groepPieChart"></canvas></div>
                    <div class="chart-container"><canvas id="spelerBarChart"></canvas></div>
                </div>
                <div class="card">
                    <h2>Kater Voorspeller</h2>
                    <div id="kater-container"></div>
                </div>
            </div>

            <div id="page-kaart" class="page">
                <div class="card">
                    <h2>Kaart</h2>
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="bottom-nav" id="bottom-nav">
        <div class="nav-item active" onclick="wisselPagina('page-scores', this)"><span class="nav-icon">📊</span>Scores</div>
        <div class="nav-item" onclick="wisselPagina('page-games', this)"><span class="nav-icon">🎮</span>Games</div>
        <div class="nav-item" onclick="wisselPagina('page-stats', this)"><span class="nav-icon">📈</span>Stats</div>
        <div class="nav-item" onclick="wisselPagina('page-kaart', this)"><span class="nav-icon">📍</span>Kaart</div>
    </div>

    <div id="swasi-overlay">
        <div id="swasi-instructie">Vingers op het scherm</div>
        <div id="swasi-countdown">3</div>
        <button id="swasi-sluit-btn" onclick="stopSwasi()" class="btn-gevaar">Sluiten</button>
    </div>

    <audio id="notificatie-geluid" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-500.wav" preload="auto"></audio>

    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-messaging.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="app.js"></script>
</body>
</html>
